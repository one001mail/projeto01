name: architecture

on:
  push:
    branches: [main, master]
    paths:
      - 'backend-node/**'
      - 'architecture.md'
      - '.github/workflows/architecture.yml'
  pull_request:
    paths:
      - 'backend-node/**'
      - 'architecture.md'
      - '.github/workflows/architecture.yml'

jobs:
  boundaries:
    name: Clean Architecture boundaries
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      # Hard gate: boundary violations fail the build immediately.
      - name: Boundary check (domain / application / infra)
        run: npm run check:boundaries

      # Hard gate: layer moves that slip past regex checking show up here.
      - name: Typecheck
        run: npm run typecheck

      # Hard gate: enforcement script + module behaviour tests.
      - name: Tests
        run: npm test
